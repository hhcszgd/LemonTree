name: iOS CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: "LemonTree"
  DESTINATION: "platform=iOS Simulator,name=iPhone 16 Pro"

jobs:
  # ─── Build and Test ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -r | head -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE"
          fi
          echo "Selected: $(xcode-select -p)"
          echo "Xcode: $(xcodebuild -version | head -1)"
          echo "SDK: $(xcodebuild -version -sdk iphonesimulator SDKVersion 2>/dev/null)"
          echo "Latest OS: $(xcrun simctl list runtimes 'iOS-*-*' 2>/dev/null | sort -r | head -1 | grep -oE '[0-9]+\.[0-9]+' | head -1 || echo 'unknown')"

      - name: List available simulators
        run: xcrun simctl list devices available 2>/dev/null | grep -E "iPhone.*(Pro|16)" | head -10

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project LemonTree.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphonesimulator \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages \
            CODE_SIGNING_ALLOWED=NO 2>&1

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project LemonTree.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphonesimulator \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            -only-testing:"LemonTreeTests" \
            -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages \
            CODE_SIGNING_ALLOWED=NO 2>&1

      - name: Run UI Tests
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild test \
            -project LemonTree.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphonesimulator \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            -only-testing:"LemonTreeUITests" \
            -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages \
            CODE_SIGNING_ALLOWED=NO 2>&1

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 7

  # ─── Lint ───────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
        continue-on-error: true

  # ─── Danger (PR checks) ─────────────────────────────────────────
  danger:
    name: Danger Bot
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Danger
        uses: docker://ghcr.io/danger/danger-swift-with-swiftlint:latest
        with:
          args: --failOnErrors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
